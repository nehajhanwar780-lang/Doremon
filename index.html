<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doreamon</title>
    <link rel="stylesheet" href="css/styel.css">
</head>

<body>
    <div class="doraemon">
        <div class="face">
            <!--Eyes-->
            <div class="both_eyes">
                <div class="eye left-eye">
                    <div class="pupil"></div>
                </div>
                <div class="eye right-eye">
                    <div class="pupil"></div>
                </div>
            </div>
            <!--Nose-->
            <div class="nose"></div>
            <div class="inner_nose"></div>

            <!--centre-line-->
            <div class="centre-line"></div>
            <!--Mouth-->
            <div class="Mouth">
                <div class="tongue"></div>
            </div>
            <!--whiskers left-->
            <div class="whiskers_right1"></div>
            <div class="whiskers_right2"></div>
            <div class="whiskers_right3"></div>

            <!--whiskers right-->
            <div class="whiskers_left1"></div>
            <div class="whiskers_left2"></div>
            <div class="whiskers_left3"></div>
        </div>
    </div>
    </div>
</body>

</html>
